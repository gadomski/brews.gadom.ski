services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    user: root
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    volumes:
      - dynamodb_data:/data
    ports:
      - "8001:8000"
  s3:
    image: motoserver/moto:latest
    ports:
      - "5000:5000"
  init:
    image: amazon/aws-cli:latest
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: [""]
    command:
      - /bin/sh
      - -c
      - |
        until aws dynamodb list-tables --endpoint-url http://dynamodb:8000 >/dev/null 2>&1; do
          echo "waiting for dynamodb..."
          sleep 1
        done
        until aws s3 ls --endpoint-url http://s3:5000 >/dev/null 2>&1; do
          echo "waiting for s3..."
          sleep 1
        done
        aws dynamodb create-table \
          --endpoint-url http://dynamodb:8000 \
          --table-name brews \
          --attribute-definitions AttributeName=pk,AttributeType=S \
          --key-schema AttributeName=pk,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST || true
        aws s3 mb s3://brews-images --endpoint-url http://s3:5000 || true
        aws s3api put-bucket-cors \
          --endpoint-url http://s3:5000 \
          --bucket brews-images \
          --cors-configuration '{
            "CORSRules": [
              {
                "AllowedOrigins": ["http://localhost:5173"],
                "AllowedMethods": ["PUT"],
                "AllowedHeaders": ["*"]
              }
            ]
          }' || true
    depends_on:
      - dynamodb
      - s3
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      AWS_ENDPOINT_URL_DYNAMODB: http://dynamodb:8000
      AWS_ENDPOINT_URL_S3: http://s3:5000
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
      BREWS_S3_PUBLIC_ENDPOINT: http://localhost:5000
    env_file:
      - .env
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://localhost:8000/health")
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      init:
        condition: service_completed_successfully
  frontend:
    image: node:22-bookworm-slim
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:8000
      CI: "true"
    command: sh -c "corepack enable && pnpm install && pnpm dev --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  dynamodb_data:
  frontend_node_modules:
